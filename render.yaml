services:
  - type: web
    name: fixture360-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: MONGODB_DB
        value: fixture360
      - key: DATA_DIR
        value: /var/data
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: PUBLIC_BASE_URL
        value: https://fixture360-api.onrender.com
      - key: CORS_ORIGINS
        value: http://localhost:5173
      - key: MONGODB_URI
        sync: false
    disk:
      name: fixture360-data
      mountPath: /var/data
      sizeGB: 1
